<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello, Kiel!</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0B3D66 0%, #145C9E 45%, #1E8FC4 100%);
    font-family: Georgia, serif;
    position: relative;
  }
  h1 {
    position: absolute;
    top: 30px;
    left: 30px;
    margin: 0;
    color: #E8F6FF;
    font-size: 2.4rem;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    z-index: 2;
  }
  .bubble {
    position: absolute;
    bottom: -50px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    animation: rise linear infinite;
  }
  @keyframes rise {
    to { transform: translateY(-110vh); opacity: 0; }
  }
  .shell-btn {
    z-index: 2;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    width: 130px;
    height: 130px;
    font-size: 3.5rem;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .btn-row {
    display: flex;
    gap: 40px;
    z-index: 2;
  }
  .shell-btn:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <h1>Hello, Kiel!</h1>

  <div class="btn-row">
    <a class="shell-btn" href="https://www.google.com" target="_blank" rel="noopener">🪸</a>
    <a class="shell-btn" href="https://www.youtube.com/watch?v=SXKlJuO07eM&list=RDSXKlJuO07eM&start_radio=1" target="_blank" rel="noopener">🐚</a>
    <a class="shell-btn" href="https://www.facebook.com" target="_blank" rel="noopener">🪨</a>
  </div>

  <script>
    // sprinkle a few rising bubbles
    for (let i = 0; i < 15; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = Math.random() * 20 + 8;
      b.style.width = b.style.height = size + 'px';
      b.style.left = Math.random() * 100 + 'vw';
      b.style.animationDuration = (Math.random() * 6 + 6) + 's';
      b.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(b);
    }
  </script>
</body>
</html>
